<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Nosotros - SmartRoast</title>

    <link rel="stylesheet" href="style.css">

    <link rel="icon"
    href="https://static.vecteezy.com/system/resources/thumbnails/044/775/655/small/coffee-bean-isolated-on-transparent-background-png.png">

    <style>

        .nosotros-container{
            max-width: 1100px;
            margin: auto;
            padding: 60px 20px;
        }

        .nosotros-card{
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,.12);
            margin-bottom: 40px;
        }

        .nosotros-card h2{
            text-align: center;
            margin-bottom: 25px;
        }

        .nosotros-card p{
            line-height: 1.8;
            text-align: justify;
        }

        .valores{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
        }

        .valor-card{
            width: 280px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,.12);
        }

        .valor-card h3{
            margin-bottom: 15px;
        }

        .equipo{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
        }

        .miembro{
            width: 260px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,.12);
        }

        .avatar{
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #6f4e37;
            color: white;
            font-size: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            margin-bottom: 15px;
        }

    </style>
</head>
